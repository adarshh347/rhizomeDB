<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RhizomeDB · Reader</title>
<style>
  :root{
    --bg:#0e1014; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --ink:#e7e9ee; --dim:#9aa3b2; --accent:#d98c5f; --accent2:#7fb0a3;
    --good:#6fcf97; --bad:#e07a7a; --code:#11141a; --mark:#5a4a2a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.6 ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 22px 90px}
  .top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px}
  h1{font-family:Georgia,serif;font-size:23px;margin:0}
  .src{color:var(--dim);font-size:13px}
  .grid{display:grid;grid-template-columns:1fr 380px;gap:20px;margin-top:18px}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .ctx{display:flex;gap:10px;margin:10px 0}
  .ctx a{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:12.5px;color:var(--dim)}
  .ctx a:hover{border-color:var(--accent);text-decoration:none;color:var(--ink)}
  .passage{font-family:Georgia,serif;font-size:17px;line-height:1.85;white-space:pre-wrap;
    user-select:text}
  .passage mark{background:var(--mark);color:#f3e6cf;border-radius:3px;padding:0 2px;cursor:pointer;
    border-bottom:2px solid var(--accent)}
  .passage mark.has-note{border-bottom-style:double}
  h2{font-family:Georgia,serif;font-size:17px;margin:0 0 12px;border-bottom:1px solid var(--line);
    padding-bottom:8px}
  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 13px;
    cursor:pointer;font-size:13px;color:var(--dim)}
  .tab.active{border-color:var(--accent);color:var(--ink)}
  .pane{display:none}.pane.active{display:block}
  .ann{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:10px 12px;margin:8px 0}
  .ann .q{font-family:Georgia,serif;color:#e9d9c2;font-size:14px}
  .ann .n{font-size:13px;color:#cfd6e0;margin-top:5px}
  .ann .meta{display:flex;justify-content:space-between;color:var(--dim);font-size:11px;margin-top:6px}
  .ann .del{color:var(--bad);cursor:pointer}
  textarea,input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:9px 11px;font:14px/1.5 ui-sans-serif;resize:vertical}
  button{background:var(--accent);color:#1a1206;border:0;border-radius:8px;padding:9px 14px;
    font-weight:600;cursor:pointer;font-size:13.5px}
  button.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:default}
  .seltool{position:absolute;z-index:50;display:none;gap:6px;background:var(--panel);
    border:1px solid var(--accent);border-radius:8px;padding:6px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .seltool button{padding:6px 10px;font-size:12.5px}
  .chat{display:flex;flex-direction:column;gap:10px}
  .msgs{max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
  .msg{border-radius:10px;padding:10px 13px;font-size:14px;line-height:1.6}
  .msg.user{background:var(--panel2);border:1px solid var(--line);align-self:flex-end;max-width:88%}
  .msg.assistant{background:#15201d;border:1px solid #244039;max-width:95%;white-space:pre-wrap}
  .msg .who{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
  .row{display:flex;gap:8px;align-items:flex-end}
  .hint{color:var(--dim);font-size:12px;margin-top:6px}
  .empty{color:var(--dim);font-style:italic;font-size:13px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--accent2);color:var(--ink);padding:9px 16px;border-radius:8px;
    font-size:13px;display:none;z-index:99}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1 id="title">Loading…</h1>
      <div class="src" id="src"></div>
    </div>
    <a href="/" id="back">← back to explore</a>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="ctx" id="ctx"></div>
        <div class="passage" id="passage">…</div>
        <div class="hint">Select any text in the passage to highlight it or attach a comment.</div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="tabs">
          <div class="tab active" data-pane="notes" id="tab-notes">Notes &amp; highlights</div>
          <div class="tab" data-pane="chat" id="tab-chat">Discuss with AI</div>
        </div>

        <div class="pane active" id="pane-notes">
          <div id="annlist"></div>
          <h2 style="margin-top:16px;font-size:14px">Add a note</h2>
          <textarea id="newnote" rows="3" placeholder="A thought, a question, a connection to chase…"></textarea>
          <div style="margin-top:8px"><button id="addnote">Save note</button></div>
        </div>

        <div class="pane" id="pane-chat">
          <div class="chat">
            <div class="msgs" id="msgs"><div class="empty">Ask anything about this passage — the AI stays grounded in the text in front of you.</div></div>
            <div class="row">
              <textarea id="chatin" rows="2" placeholder="e.g. How does this idea of 'keeping' relate to dwelling?"></textarea>
              <button id="send">Send</button>
            </div>
            <div class="hint" id="chathint"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="seltool" id="seltool">
  <button id="hl">Highlight</button>
  <button class="ghost" id="hlc">Highlight + comment</button>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const params = new URLSearchParams(location.search);
const qs = k => params.get(k);

let TARGET = '';      // annotation/chat key
let CONTEXT = '';     // full text used to ground chat
let LABEL = '';       // human label for the source
let annotations = [];

function toast(t){ const e=$('#toast'); e.textContent=t; e.style.display='block';
  setTimeout(()=>e.style.display='none', 1800); }

// ---- load the document: chunk mode (?id=) or doc mode (?target=&doc=1) ----
async function boot(){
  if(qs('doc')==='1' && qs('target')){
    // exploration / arbitrary text passed via sessionStorage from the main page
    const raw = sessionStorage.getItem('rhz_doc_'+qs('target'));
    const doc = raw ? JSON.parse(raw) : {title:qs('target'), text:'(text not found — open from the explore page)'};
    TARGET = qs('target'); CONTEXT = doc.text||''; LABEL = doc.title||TARGET;
    $('#title').textContent = doc.title||'Exploration';
    $('#src').textContent = doc.subtitle||'';
    renderPassage(CONTEXT);
  } else {
    const id = qs('id'); TARGET = id;
    const r = await fetch('/api/passage?id='+encodeURIComponent(id));
    if(!r.ok){ $('#title').textContent='Passage not found'; return; }
    const d = await r.json();
    CONTEXT = d.text; LABEL = `${d.author||'Unknown'}, ${d.title||d.book_id}${d.page?(', p.'+d.page):''}`;
    $('#title').textContent = d.title || d.book_id;
    $('#src').textContent = `${d.author||'Unknown'}${d.page?(' · p.'+d.page):''}${d.heading?(' · '+d.heading):''} · ${d.id}`;
    let ctx='';
    if(d.prev) ctx += `<a href="/reader?id=${encodeURIComponent(d.prev.id)}">← previous: ${esc(d.prev.text)}</a>`;
    if(d.next) ctx += `<a href="/reader?id=${encodeURIComponent(d.next.id)}">next: ${esc(d.next.text)} →</a>`;
    $('#ctx').innerHTML = ctx;
    renderPassage(d.text);
  }
  await loadAnnotations();
  await loadChat();
}

// ---- passage rendering with highlights ----
function renderPassage(text){
  let html = esc(text);
  // wrap each highlight quote (first un-wrapped occurrence) in <mark>
  annotations.filter(a=>a.kind==='highlight' && a.quote).forEach(a=>{
    const q = esc(a.quote);
    const idx = html.indexOf(q);
    if(idx===-1) return;
    const cls = a.note ? 'has-note' : '';
    const repl = `<mark class="${cls}" data-id="${a.id}" title="${a.note?esc(a.note):'highlight'}">${q}</mark>`;
    html = html.slice(0,idx) + repl + html.slice(idx+q.length);
  });
  const p = $('#passage'); p.innerHTML = html;
  p.querySelectorAll('mark').forEach(m=>{
    m.onclick = ()=>{ switchTab('notes'); const el=document.getElementById('ann-'+m.dataset.id);
      if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='1px solid var(--accent)';
        setTimeout(()=>el.style.outline='',1200);} };
  });
}

// ---- selection toolbar ----
let pendingQuote='';
$('#passage').addEventListener('mouseup', e=>{
  const sel = window.getSelection();
  const txt = (sel?sel.toString():'').trim();
  const tool = $('#seltool');
  if(txt.length<3){ tool.style.display='none'; return; }
  pendingQuote = txt;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  tool.style.display='flex';
  tool.style.top = (window.scrollY + rect.top - tool.offsetHeight - 8)+'px';
  tool.style.left = (window.scrollX + rect.left)+'px';
});
document.addEventListener('mousedown', e=>{
  if(!$('#seltool').contains(e.target) && e.target.tagName!=='MARK') $('#seltool').style.display='none';
});
$('#hl').onclick = ()=> saveAnnotation('highlight', pendingQuote, '');
$('#hlc').onclick = ()=>{
  const note = prompt('Comment on:\n\n"'+pendingQuote.slice(0,160)+(pendingQuote.length>160?'…':'')+'"\n\nYour comment:');
  if(note!==null) saveAnnotation('highlight', pendingQuote, note);
};

// ---- annotations ----
async function loadAnnotations(){
  const r = await fetch('/api/annotations?target='+encodeURIComponent(TARGET));
  annotations = (await r.json()).items || [];
  renderPassage(CONTEXT);
  renderAnnList();
}
function renderAnnList(){
  const box = $('#annlist');
  if(!annotations.length){ box.innerHTML = '<div class="empty">No notes or highlights yet.</div>'; return; }
  box.innerHTML = annotations.map(a=>`
    <div class="ann" id="ann-${a.id}">
      ${a.quote?`<div class="q">“${esc(a.quote)}”</div>`:''}
      ${a.note?`<div class="n">${esc(a.note)}</div>`:''}
      <div class="meta"><span>${a.kind==='highlight'?'highlight':'note'} · ${esc(a.created||'')}</span>
        <span class="del" data-id="${a.id}">delete</span></div>
    </div>`).join('');
  box.querySelectorAll('.del').forEach(d=> d.onclick = ()=>delAnnotation(d.dataset.id));
}
async function saveAnnotation(kind, quote, note){
  $('#seltool').style.display='none';
  const r = await fetch('/api/annotations', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({target:TARGET, kind, quote, note})});
  if(r.ok){ toast('Saved'); window.getSelection().removeAllRanges(); await loadAnnotations(); }
}
async function delAnnotation(id){
  await fetch('/api/annotations/delete', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})});
  await loadAnnotations();
}
$('#addnote').onclick = async ()=>{
  const t = $('#newnote').value.trim(); if(!t) return;
  await saveAnnotation('note','',t); $('#newnote').value='';
};

// ---- tabs ----
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.pane===name));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active', p.id==='pane-'+name));
}
document.querySelectorAll('.tab').forEach(t=> t.onclick = ()=>switchTab(t.dataset.pane));

// ---- chat ----
function renderMsg(m){
  const who = m.role==='user'?'You':'Companion';
  return `<div class="msg ${m.role}"><div class="who">${who}</div>${esc(m.content)}</div>`;
}
async function loadChat(){
  const r = await fetch('/api/chat?target='+encodeURIComponent(TARGET));
  const msgs = (await r.json()).messages || [];
  const box = $('#msgs');
  if(msgs.length) box.innerHTML = msgs.map(renderMsg).join('');
  box.scrollTop = box.scrollHeight;
}
$('#send').onclick = sendChat;
$('#chatin').addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) sendChat(); });
async function sendChat(){
  const inp=$('#chatin'); const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; $('#send').disabled=true; $('#chathint').textContent='thinking…';
  const box=$('#msgs');
  if(box.querySelector('.empty')) box.innerHTML='';
  box.innerHTML += renderMsg({role:'user',content:msg}); box.scrollTop=box.scrollHeight;
  try{
    const r = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({target:TARGET, message:msg, context:CONTEXT, source_label:LABEL})});
    const d = await r.json();
    if(d.error){ $('#chathint').textContent = d.error; }
    else { box.innerHTML += renderMsg({role:'assistant',content:d.reply});
      $('#chathint').textContent = d.usage ? `${d.usage.provider||''} · ${d.usage.total||0} tokens (run total ${d.cumulative||0})` : ''; }
    box.scrollTop=box.scrollHeight;
  }catch(e){ $('#chathint').textContent='request failed'; }
  $('#send').disabled=false;
}

boot();
</script>
</body>
</html>
